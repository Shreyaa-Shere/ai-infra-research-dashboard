name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: airesearch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/airesearch_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Adminpass1!
      BCRYPT_ROUNDS: 4

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (eslint + vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests (Vitest)
        run: npm test

  # ── E2E ────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend deps
        working-directory: apps/web
        run: npm install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Copy env file
        run: cp .env.example .env

      - name: Start services
        run: docker compose -f infra/docker-compose.yml up -d --build
        env:
          BCRYPT_ROUNDS: 4

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz && break
            sleep 3
          done

      - name: Run migrations + seed
        run: |
          docker compose -f infra/docker-compose.yml exec -T api alembic upgrade head
          docker compose -f infra/docker-compose.yml exec -T api python scripts/seed.py

      - name: Run Playwright e2e
        working-directory: apps/web
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

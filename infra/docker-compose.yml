services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-airesearch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/airesearch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123!}
      INGESTION_SOURCE_TYPE: ${INGESTION_SOURCE_TYPE:-file}
      INGESTION_SOURCE_NAME: ${INGESTION_SOURCE_NAME:-local-ingest}
      INGESTION_INTERVAL_MIN: ${INGESTION_INTERVAL_MIN:-60}
      INGEST_DIR: /app/data/ingest
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      INVITE_TOKEN_TTL_DAYS: ${INVITE_TOKEN_TTL_DAYS:-7}
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/app
      - ../data/ingest:/app/data/ingest:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: celery -A api.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/airesearch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INGESTION_SOURCE_TYPE: ${INGESTION_SOURCE_TYPE:-file}
      INGESTION_SOURCE_NAME: ${INGESTION_SOURCE_NAME:-local-ingest}
      INGESTION_INTERVAL_MIN: ${INGESTION_INTERVAL_MIN:-60}
      INGEST_DIR: /app/data/ingest
    volumes:
      - ../apps/api:/app
      - ../data/ingest:/app/data/ingest:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: celery -A api.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/airesearch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INGESTION_SOURCE_TYPE: ${INGESTION_SOURCE_TYPE:-file}
      INGESTION_SOURCE_NAME: ${INGESTION_SOURCE_NAME:-local-ingest}
      INGESTION_INTERVAL_MIN: ${INGESTION_INTERVAL_MIN:-60}
      INGEST_DIR: /app/data/ingest
    volumes:
      - ../apps/api:/app
      - ../data/ingest:/app/data/ingest:ro
    depends_on:
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
